{{- $ns := include "tutor.namespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutor-app
  namespace: {{ $ns }}
  labels:
    app: tutor-app
    {{- include "tutor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutor-app
  template:
    metadata:
      labels:
        app: tutor-app
    spec:
      runtimeClassName: {{ .Values.runtimeClassName }}
      containers:
        - name: tutor-app
          image: {{ .Values.images.tutorApp }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - { name: NAMESPACE, value: {{ $ns | quote }} }
            - { name: TRITON_URL, value: "triton:{{ .Values.triton.httpPort }}" }
          ports:
            - { name: http, containerPort: {{ .Values.tutorApp.port }} }
          {{- if gt (int .Values.tutorApp.gpu) 0 }}
          resources:
            limits:
              {{ .Values.gpuResourceName }}: {{ .Values.tutorApp.gpu }}
          {{- end }}
          volumeMounts:
            # Shared model repository — read-write here so engines built in this
            # pod (lab ISL flow) land directly in Triton's repository. The app's
            # code + languages/ (incl. the ASL model) are baked into the image;
            # lab write-dirs (checkpoints/, datasets/) use the container fs.
            - { name: models, mountPath: /models }
      volumes:
        - { name: models, persistentVolumeClaim: { claimName: models } }
