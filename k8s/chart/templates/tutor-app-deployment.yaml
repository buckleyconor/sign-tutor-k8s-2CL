{{- $ns := include "tutor.namespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutor-app
  namespace: {{ $ns }}
  labels:
    app: tutor-app
    {{- include "tutor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutor-app
  template:
    metadata:
      labels:
        app: tutor-app
    spec:
      runtimeClassName: {{ .Values.runtimeClassName }}
      containers:
        - name: tutor-app
          image: {{ .Values.images.tutorApp }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          # Hardening for the web-exposed embedded terminal (runs arbitrary
          # commands server-side, src/terminal/executor.py). The container still
          # runs as root so the lab's writes to /app (datasets/, checkpoints/,
          # languages/) and the /models PVC keep working — but it can no longer
          # escalate privileges or use any Linux capability, shrinking the blast
          # radius of a terminal escape. Full runAsNonRoot is deferred: it needs
          # Dockerfile chown + PVC fsGroup + a GPU/EGL run validated on-cluster.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - { name: NAMESPACE, value: {{ $ns | quote }} }
            - { name: TRITON_URL, value: "triton:{{ .Values.triton.httpPort }}" }
          ports:
            - { name: http, containerPort: {{ .Values.tutorApp.port }} }
          readinessProbe:
            # Gradio serves the app page once MediaPipe + the registry are loaded.
            httpGet: { path: /, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: {{ .Values.tutorApp.resources.requests.cpu | quote }}
              memory: {{ .Values.tutorApp.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.tutorApp.resources.limits.cpu | quote }}
              memory: {{ .Values.tutorApp.resources.limits.memory | quote }}
              {{- if gt (int .Values.tutorApp.gpu) 0 }}
              {{ .Values.gpuResourceName }}: {{ .Values.tutorApp.gpu }}
              {{- end }}
          volumeMounts:
            # Shared model repository — read-write here so engines built in this
            # pod (lab ISL flow) land directly in Triton's repository. The app's
            # code + languages/ (incl. the ASL model) are baked into the image;
            # lab write-dirs (checkpoints/, datasets/) use the container fs.
            - { name: models, mountPath: /models }
      volumes:
        - { name: models, persistentVolumeClaim: { claimName: models } }
