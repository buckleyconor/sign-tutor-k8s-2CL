name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The deterministic unit suite (registry, normalisation, smoother, scorer,
      # feature dispatcher, terminal executor) needs no GPU, Triton, or webcam —
      # only these lightweight deps. The integration suite (tests/integration)
      # is intentionally excluded: it imports mediapipe/opencv/tritonclient and
      # requires a running Triton, so it runs on-cluster, not in CI.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy pyyaml

      - name: Run unit tests
        run: pytest tests/unit -q --cov=src --cov-report=term-missing

  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff black
      - run: ruff check src training tests
      - run: black --check src training tests

  chart:
    name: Helm chart renders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint k8s/chart --set participant=p1 --set host=p1.lab.internal
      - run: helm template tutor-p1 k8s/chart --set participant=p1 --set host=p1.lab.internal > /dev/null
